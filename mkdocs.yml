site_name: AXEtract
site_description: Low-Cost Cross-Domain Web Structured Information Extraction using specialized LoRA adapters.
site_url: https://abdo-mansour.github.io/axetract/

theme:
  name: material
  logo: assets/logo-black-mode.svg
  favicon: assets/logo-black-mode.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

repo_name: abdo-Mansour/axetract
repo_url: https://github.com/abdo-Mansour/axetract

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
    - Architecture: user-guide/architecture.md
    - Pipeline: user-guide/pipeline.md
    - Components: user-guide/components.md
    - Axe Server: user-guide/server.md
  - API Reference:
    - Pipeline: api/pipeline.md
    - Data Types: api/data_types.md
    - LLM Clients: api/llm.md
    - Components:
      - Preprocessor: api/components/preprocessor.md
      - Pruner: api/components/pruner.md
      - Extractor: api/components/extractor.md
      - Postprocessor: api/components/postprocessor.md
  - Examples:
    - Basic Extraction: examples/basic.md
    - Batch Processing: examples/batch.md
    - vLLM Serving: examples/vllm.md
  - Contributing: contributing.md
  - FAQ: faq.md

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
